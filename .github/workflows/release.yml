name: 'Release DroidGear'

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version }}

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v6

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          VERSION="${RELEASE_TAG}"
          # Extract changelog for current version (between ## vX.Y.Z and next ## vX.Y.Z)
          # Use exact match with $ to prevent start line matching end pattern
          NOTES=$(sed -n "/^## ${VERSION}$/,/^## v[0-9]/p" CHANGELOG.md | sed '$d')
          # If no next version found, get everything from current version to end
          if [ -z "$NOTES" ]; then
            NOTES=$(sed -n "/^## ${VERSION}$/,\$p" CHANGELOG.md)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create draft release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: 'DroidGear ${{ env.RELEASE_TAG }}'
          body: ${{ steps.changelog.outputs.notes }}
          draft: true
          prerelease: false

  publish-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--bundles app,dmg --target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--bundles app,dmg --target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: '--bundles msi --target x86_64-pc-windows-msvc --config src-tauri/tauri.windows.conf.json'
            target: 'x86_64-pc-windows-msvc'
          - platform: 'ubuntu-22.04'
            args: '--bundles appimage --target x86_64-unknown-linux-gnu'
            target: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          uploadUpdaterJson: true
          uploadPlainBinary: true
          args: ${{ matrix.args }}

      - name: Package portable updater assets
        if: runner.os == 'Windows'
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $bin = "src-tauri/target/${{ matrix.target }}/release/droidgear.exe"
          if (-not (Test-Path $bin)) {
            Write-Error "Missing binary: $bin"
            exit 1
          }

          $portableAsset = "droidgear_windows_x64.exe"
          $portableAssetPath = Join-Path $env:GITHUB_WORKSPACE $portableAsset
          Copy-Item $bin $portableAssetPath -Force

          $tauri = Join-Path $env:GITHUB_WORKSPACE "node_modules\.bin\tauri.cmd"
          if (-not (Test-Path $tauri)) {
            Write-Error "Missing Tauri CLI: $tauri"
            exit 1
          }

          & $tauri signer sign $portableAssetPath
          if (-not $?) {
            Write-Error "便携版资产签名失败"
            exit 1
          }

          $sigPath = "$portableAssetPath.sig"
          if (-not (Test-Path $sigPath)) {
            Write-Error "缺少 Tauri 生成的便携版签名文件: $sigPath"
            exit 1
          }

          $sha256 = (Get-FileHash $portableAssetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $version = $env:RELEASE_TAG.TrimStart('v')
          $pubDate = (Get-Date).ToUniversalTime().ToString("o")
          $manifestPath = Join-Path $env:GITHUB_WORKSPACE "latest-portable.json"

          node scripts/create-portable-update-manifest.js `
            --signature-file "$sigPath" `
            --output "$manifestPath" `
            --version "$version" `
            --pub-date "$pubDate" `
            --url "https://github.com/${{ github.repository }}/releases/latest/download/$portableAsset" `
            --sha256 "$sha256" `
            --release-url "https://github.com/${{ github.repository }}/releases/tag/$env:RELEASE_TAG"
          if (-not $?) {
            exit 1
          }

          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          if ([string]::IsNullOrWhiteSpace($manifest.signature)) {
            Write-Error "便携版 manifest 未生成 signature 字段"
            exit 1
          }

          $decodedSignature = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($manifest.signature))
          if (-not $decodedSignature.StartsWith("untrusted comment:")) {
            Write-Error "便携版 manifest 的 signature 解码后未以 minisign 头开头"
            exit 1
          }
          if ($decodedSignature.Contains("Public signature:")) {
            Write-Error "便携版 manifest 的 signature 混入了 signer 控制台输出: Public signature"
            exit 1
          }
          if ($decodedSignature.Contains("Your file was signed successfully")) {
            Write-Error "便携版 manifest 的 signature 混入了 signer 控制台输出: 成功提示文案"
            exit 1
          }
          if ($decodedSignature.Contains("Make sure to include this into the signature field of your update server")) {
            Write-Error "便携版 manifest 的 signature 混入了 signer 控制台输出: 更新服务器提示文案"
            exit 1
          }

          gh release upload "$env:RELEASE_TAG" $portableAssetPath $sigPath $manifestPath --clobber

      - name: Build droidgear-tui
        shell: bash
        run: |
          cd src-tauri
          cargo build -p droidgear-tui --release --locked --target "${{ matrix.target }}"

      - name: Package droidgear-tui (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="src-tauri/target/${{ matrix.target }}/release/droidgear-tui"
          if [ ! -f "$BIN" ]; then
            echo "Missing binary: $BIN" >&2
            exit 1
          fi

          ASSET="droidgear-tui-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          tar -C "$(dirname "$BIN")" -czf "$ASSET" "$(basename "$BIN")"
          echo "TUI_ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Package droidgear-tui (zip)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $bin = "src-tauri/target/${{ matrix.target }}/release/droidgear-tui.exe"
          if (-not (Test-Path $bin)) {
            Write-Error "Missing binary: $bin"
            exit 1
          }

          $asset = "droidgear-tui-$env:RELEASE_TAG-${{ matrix.target }}.zip"
          $dir = Split-Path $bin
          Push-Location $dir
          Compress-Archive -Path "droidgear-tui.exe" -DestinationPath "$env:GITHUB_WORKSPACE\\$asset" -Force
          Pop-Location
          echo "TUI_ASSET=$asset" >> $env:GITHUB_ENV

      - name: Upload droidgear-tui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.RELEASE_TAG }}" "${{ env.TUI_ASSET }}" --clobber
